<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-5">

    <h2>
        <span class="text-success fw-bold">Create</span>
        <i>Profile</i>
    </h2>

    <form action="/addStudent" method="POST">

        <!-- General Information -->

        <h3 class="mt-4 text-primary fw-bold">General Information</h3>

        <div class="row mt-3">

            <div class="col-md-6">
                <label class="form-label">First Name</label>
                <input type="text" name="first_name" class="form-control"
                    placeholder="Enter your first name" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Last Name</label>
                <input type="text" name="last_name" class="form-control"
                    placeholder="Enter your last name" required>
            </div>

        </div>

        <div class="row mt-3">

            <div class="col-md-6">

                <label class="form-label">Department</label>

                <select class="form-select" name="department" required>

                    <option value="">Select Department</option>
                    <option>CSE</option>
                    <option>EEE</option>
                    <option>CE</option>
                    <option>LAW</option>
                    <option>English</option>
                    <option>Pharmacy</option>

                </select>

            </div>

            <div class="col-md-6">

                <label class="form-label">Student ID</label>

                <input type="text" name="student_id" class="form-control"
                    placeholder="Example: 2003008" required>

            </div>

        </div>

        <div class="row mt-3">

            <div class="col-md-6">

                <label class="form-label">Session</label>

                <input type="text" name="session" class="form-control"
                    placeholder="Example: 2024-2025" required>

            </div>

            <div class="col-md-6">

                <label class="form-label">Semester</label>

                <select class="form-select" name="semester" required>

                    <option value="">Select Semester</option>
                    <option>1st Year Odd Semester</option>
                    <option>1st Year Even Semester</option>
                    <option>2nd Year Odd Semester</option>
                    <option>2nd Year Even Semester</option>
                    <option>3rd Year Odd Semester</option>
                    <option>3rd Year Even Semester</option>
                    <option>4th Year Odd Semester</option>
                    <option>4th Year Even Semester</option>

                </select>

            </div>

        </div>

        <div class="row mt-3">

            <div class="col-md-6">

                <label class="form-label">Blood Group</label>

                <input type="text" name="blood_group" class="form-control"
                    placeholder="Example: A+" required>

            </div>

            <div class="col-md-6">

                <label class="form-label">Date of Birth</label>

                <input type="date" name="dob" class="form-control" required>

            </div>

        </div>

        <!-- Contact Information -->

        <h3 class="mt-5 text-primary fw-bold">Contact Information</h3>

        <div class="mt-3">

            <label class="form-label">Mobile Number</label>

            <input type="tel" name="mobile" class="form-control"
                placeholder="Enter your mobile number" required>

        </div>

        <div class="mt-3">

            <label class="form-label">Email Address</label>

            <input type="email" name="email" class="form-control"
                placeholder="example@gmail.com" required>

        </div>

        <!-- Security Information -->

        <h3 class="mt-5 text-primary fw-bold">Security Information</h3>

        <div class="mt-3">

            <label class="form-label">Password</label>

            <input type="password" name="password" class="form-control"
                placeholder="Enter a strong password" required>

        </div>

        <!-- Address Information -->

        <h3 class="mt-5 text-primary fw-bold">Address Information</h3>

        <div class="mt-3">

            <label class="form-label">Permanent Address</label>

            <input type="text" name="permanent_address" class="form-control"
                placeholder="Enter your permanent address" required>

        </div>

        <div class="mt-3">

            <label class="form-label">Present Address / Hall Name</label>

            <input type="text" name="present_address" class="form-control"
                placeholder="Enter your present address or hall name" required>

        </div>

        <!-- Submit Button -->

        <div class="mt-4 mb-4">

            <button type="submit" class="btn btn-success px-5">
                Submit
            </button>

            

        </div>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
